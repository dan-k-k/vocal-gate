# .github/workflows/release.yml
name: Build Release Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # <-- ADD THIS LINE!

jobs:
  build-windows:
    name: Build Windows VST3 Installer
    runs-on: windows-latest # This provides MSVC, CMake, and Inno Setup automatically!

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # --- 1. PREPARE DEPENDENCIES ---
    - name: Download Windows ONNX Runtime
      shell: bash
      run: |
        mkdir -p plugin/onnxruntime/lib
        
        # 1. Download the EXACT version of ONNX Runtime you used on Mac (1.24.2), but the Windows x64 version!
        curl -L "https://github.com/microsoft/onnxruntime/releases/download/v1.24.2/onnxruntime-win-x64-1.24.2.zip" -o onnx_win.zip
        unzip onnx_win.zip
        
        # 2. Copy the real Windows .lib and .dll into your CMake's expected folder
        cp onnxruntime-win-x64-1.24.2/lib/onnxruntime.lib plugin/onnxruntime/lib/
        cp onnxruntime-win-x64-1.24.2/lib/onnxruntime.dll plugin/onnxruntime/lib/

    # --- 2. COMPILE C++ ---
    - name: Configure CMake
      # Windows defaults to the MSVC compiler, which is exactly what we want.
      run: cmake -B build -S plugin

    - name: Build VST3
      # We specify Release config. Your CMake already handles copying the .dll 
      # next to the .vst3 in the POST_BUILD step!
      run: cmake --build build --config Release --target VocalGate_VST3 --parallel 4

    # --- 3. BUILD INSTALLER ---
    - name: Compile Inno Setup Installer
      # Windows-latest runners have Inno Setup pre-installed! 
      # 'iscc' is the command-line tool for Inno Setup.
      run: iscc installer.iss

    # --- 4. UPLOAD ASSET ---
    - name: Upload Windows Installer
      uses: actions/upload-artifact@v4
      with:
        name: VocalGate-Windows-Installer
        # This is the output file your installer.iss will create
        path: Output/VocalGate_Windows_Installer.exe

  build-macos:
    name: Build macOS Installer
    runs-on: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # --- 1. PREPARE DEPENDENCIES ---
    - name: Download Mac ONNX Runtime
      run: |
        mkdir -p plugin/onnxruntime/lib
        mkdir -p plugin/onnxruntime/include
        
        # Download the Mac ONNX Runtime (Universal binary or just matching what you used)
        curl -L "https://github.com/microsoft/onnxruntime/releases/download/v1.24.2/onnxruntime-osx-universal2-1.24.2.tgz" -o onnx_mac.tgz
        tar -xzf onnx_mac.tgz
        
        # Copy the dylib to where your CMake expects it
        cp onnxruntime-osx-universal2-1.24.2/lib/libonnxruntime.1.24.2.dylib plugin/onnxruntime/lib/
        # Also copy headers if your CMake expects them locally!
        cp -R onnxruntime-osx-universal2-1.24.2/include/* plugin/onnxruntime/include/

    # --- 2. COMPILE C++ ---
    - name: Configure CMake
      # Build for both Apple Silicon (arm64) and Intel (x86_64)
      run: cmake -B build -S plugin -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

    - name: Build Plugins (VST3 & AU)
      run: cmake --build build --config Release --parallel 4

    # --- 3. BUILD INSTALLER ---
    - name: Compile Mac .pkg Installer
      run: |
        chmod +x build_mac_pkg.sh
        ./build_mac_pkg.sh

    # --- 4. UPLOAD ASSET ---
    - name: Upload Mac Installer
      uses: actions/upload-artifact@v4
      with:
        name: VocalGate-Mac-Installer
        path: VocalGate_Mac_Installer.pkg

