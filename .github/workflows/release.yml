# .github/workflows/release.yml
name: Build Release Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows VST3 Installer
    runs-on: windows-latest
    if: "!contains(github.ref, '-mac')"

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Extract Version from Tag
      shell: bash
      run: |
        TAG_NAME=${{ github.ref_name }}
        VERSION=${TAG_NAME#v}
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    # Prepare dependencies
    - name: Download Windows ONNX Runtime
      shell: bash
      run: |
        mkdir -p plugin/onnxruntime/lib
        curl -L "https://github.com/microsoft/onnxruntime/releases/download/v1.24.2/onnxruntime-win-x64-1.24.2.zip" -o onnx_win.zip
        unzip onnx_win.zip
        cp onnxruntime-win-x64-1.24.2/lib/onnxruntime.lib plugin/onnxruntime/lib/
        cp onnxruntime-win-x64-1.24.2/lib/onnxruntime.dll plugin/onnxruntime/lib/

    # Compile cpp
    - name: Configure CMake
      shell: bash
      run: cmake -B build -S plugin -DCMAKE_BUILD_TYPE=Release
      env:
        CI_VERSION: ${{ env.VERSION }}

    - name: Build VST3
      run: cmake --build build --config Release --target VocalGate_VST3 --parallel 4

    # Build installer
    - name: Download VC++ Redistributable
      shell: bash
      run: curl -L "https://aka.ms/vs/17/release/vc_redist.x64.exe" -o vc_redist.x64.exe

    - name: Compile Inno Setup Installer
      run: iscc /DMyAppVersion="${{ env.VERSION }}" installer.iss

    # Upload workflow artifact
    - name: Upload Windows Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VocalGate-Windows-Installer
        path: Output/VocalGate_Windows_Installer.exe

    # Create official release
    - name: Publish Windows Installer to GitHub Releases
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: Output/VocalGate_Windows_Installer.exe
        name: Vocal Gate ${{ github.ref_name }} 
        draft: true
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS Installer
    runs-on: macos-latest
    if: "!contains(github.ref, '-win')"

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Extract Version from Tag
      shell: bash
      run: |
        TAG_NAME=${{ github.ref_name }}
        VERSION=${TAG_NAME#v}
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    # Prepare dependencies
    - name: Download Mac ONNX Runtime (Apple Silicon Only)
      run: |
        mkdir -p plugin/onnxruntime/lib
        mkdir -p plugin/onnxruntime/include
        
        # Grab the ARM64 specific binary (Notice the URL change here!)
        curl -L "https://github.com/microsoft/onnxruntime/releases/download/v1.24.2/onnxruntime-osx-arm64-1.24.2.tgz" -o onnx_mac.tgz
        tar -xzf onnx_mac.tgz
        
        # Copy the arm64 dylib and headers
        cp onnxruntime-osx-arm64-1.24.2/lib/libonnxruntime.1.24.2.dylib plugin/onnxruntime/lib/
        cp -R onnxruntime-osx-arm64-1.24.2/include/* plugin/onnxruntime/include/

    # Compile cpp
    - name: Configure CMake
      shell: bash
      run: cmake -B build -S plugin -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="arm64" -DCMAKE_OSX_DEPLOYMENT_TARGET="11.0"
      env:
        CI_VERSION: ${{ env.VERSION }}

    - name: Build Plugins (VST3 & AU)
      run: cmake --build build --config Release --parallel 4

    # Build installer
    - name: Compile Mac .pkg Installer
      run: |
        chmod +x build_mac_pkg.sh
        ./build_mac_pkg.sh ${{ env.VERSION }}

    # Upload asset
    - name: Upload Mac Installer
      uses: actions/upload-artifact@v4
      with:
        name: VocalGate-Mac-Installer
        path: VocalGate_Mac_Installer.pkg

    # Create official release
    - name: Publish Mac Installer to GitHub Releases
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: VocalGate_Mac_Installer.pkg
        name: Vocal Gate ${{ github.ref_name }} 
        draft: true
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

