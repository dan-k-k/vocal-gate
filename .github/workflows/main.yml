# .github/workflows/main.yml
name: Vocal Gate CI # 1. Changed the name!

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  # Job 1: Python ML Tests
  test-python:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest torch torchaudio soundfile librosa scikit-learn matplotlib numpy onnxruntime

    - name: Run PyTest
      # 3. Just ensure your repository actually has a tests/Python/ folder!
      run: pytest tests/Python/

  # Job 2: C++ FIFO & Buffer Tests
  test-cpp:
    name: C++ Unit Tests
    runs-on: macos-14
    
    steps:
    - name: Checkout Code with Submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive 

    - name: Bypass CMake ONNX Requirement
      run: |
        # We still need this dummy file so CMake's configure step doesn't crash 
        # when reading juce_add_binary_data.
        mkdir -p plugin 
        touch plugin/vocalgate_int8.onnx

    - name: Configure CMake
      run: cmake -B build -S plugin -DCMAKE_BUILD_TYPE=Release

    - name: Compile Tests Only
      # This tells CMake to ONLY build the RunCPPTests executable, ignoring the main plugin
      run: cmake --build build --target RunCPPTests --parallel 4 

    - name: Run CTest
      # NO MORE DYLD_LIBRARY_PATH! The tests are entirely self-sufficient now.
      run: ctest --test-dir build --output-on-failure

