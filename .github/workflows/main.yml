# .github/workflows/main.yml
name: Vocal Gate CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  # Job 1: Python ML tests
  test-python:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest torch torchaudio soundfile librosa scikit-learn matplotlib numpy onnxruntime

    - name: Run PyTest
      run: pytest tests/Python/

  # Job 2: C++ tests
  test-cpp:
    name: C++ Unit Tests
    runs-on: macos-14
    
    steps:
    - name: Checkout Code with Submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive 

    - name: Configure CMake
      run: cmake -B build -S plugin -DCMAKE_BUILD_TYPE=Release

    - name: Compile Tests Only
      run: cmake --build build --target RunCPPTests --parallel 4 

    - name: Run CTest
      run: ctest --test-dir build --output-on-failure

  # Job 3: Integration test (plugin validation macOS)
  test-integration:
    name: Plugin Validation (macOS)
    runs-on: macos-14
    
    steps:
    - name: Checkout Code with Submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive 
    
    - name: Configure CMake
      run: cmake -B build -S plugin -DCMAKE_BUILD_TYPE=Release

    - name: Build VST3 Plugin
      run: cmake --build build --target VocalGate_VST3 --parallel 4 

    - name: Download and Setup pluginval
      run: |
        curl -L "https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip" -o pluginval.zip
        unzip pluginval.zip

    - name: Run pluginval Integration Test
      run: |
        ./pluginval.app/Contents/MacOS/pluginval \
          --strictness-level 5 \
          --validate-in-process \
          --validate "$HOME/Library/Audio/Plug-Ins/VST3/Vocal Gate.vst3"

  # Job 4: Integration test (plugin validation Windows)
  test-integration-windows:
    name: Plugin Validation (Windows)
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code with Submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive 

    - name: Download Windows ONNX Runtime
      shell: bash
      run: |
        mkdir -p plugin/onnxruntime/lib
        
        curl -L "https://github.com/microsoft/onnxruntime/releases/download/v1.24.2/onnxruntime-win-x64-1.24.2.zip" -o onnx_win.zip
        unzip onnx_win.zip
        
        cp onnxruntime-win-x64-1.24.2/lib/onnxruntime.lib plugin/onnxruntime/lib/
        cp onnxruntime-win-x64-1.24.2/lib/onnxruntime.dll plugin/onnxruntime/lib/

    - name: Configure CMake
      run: cmake -B build -S plugin

    - name: Build VST3 Plugin
      run: cmake --build build --config Release --target VocalGate_VST3 --parallel 4 

    - name: Download and Setup pluginval
      shell: pwsh
      run: |
        curl -L "https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Windows.zip" -o pluginval.zip
        Expand-Archive -Path pluginval.zip -DestinationPath pluginval

    - name: Run pluginval Integration Test
      shell: pwsh
      run: |
        .\pluginval\pluginval.exe --strictness-level 5 --validate-in-process --validate "C:\Program Files\Common Files\VST3\Vocal Gate.vst3"

